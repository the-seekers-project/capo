<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capo - Chord App for Musicians</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
</head>
<body>
    <div id="app">
        <header id="header">
            <div class="header-content">
                <h1 id="logo">Capo</h1>
                <div class="header-controls">
                    <!-- Song controls (hidden by default) -->
                    <div id="header-song-controls-container" class="hidden">
                        <div class="header-song-controls">
                            <button id="header-font-size-down" class="floating-btn" data-tooltip="Decrease font size">A-</button>
                            <button id="header-font-size-up" class="floating-btn" data-tooltip="Increase font size">A+</button>
                            <button id="header-transpose-down" class="floating-btn" data-tooltip="Transpose down">♭</button>
                            <button id="header-transpose-up" class="floating-btn" data-tooltip="Transpose up">♯</button>
                            <button id="header-auto-scroll" class="floating-btn" data-tooltip="Auto-scroll">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                            </button>
                            <button id="header-save" class="floating-btn" data-tooltip="Save song">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                                </svg>
                            </button>
                            <button id="header-scroll-to-top" class="floating-btn" data-tooltip="Scroll to top">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="header-controls-divider"></div>
                    </div>
                    
                    <button id="theme-toggle" class="theme-toggle" data-tooltip="Toggle theme">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
                        </svg>
                    </button>
                    <button id="search-btn" class="icon-btn" data-tooltip="Search songs">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                    <button id="saved-btn" class="icon-btn" data-tooltip="Saved songs">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <div id="search-overlay" class="overlay hidden">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search songs..." autocomplete="off">
                <button id="close-search" class="close-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
                <div id="search-results"></div>
            </div>
        </div>

        <div id="saved-overlay" class="overlay hidden">
            <div class="saved-container">
                <h2>Saved Songs</h2>
                <button id="close-saved" class="close-btn">×</button>
                <div id="saved-list"></div>
            </div>
        </div>

        <main id="main-content">
            <div id="song-view" class="hidden">
                <div id="song-header">
                    <div class="song-info">
                        <h2 id="song-title"></h2>
                        <p id="song-artist"></p>
                        <p id="current-key">Key: <span id="key-display"></span></p>
                    </div>
                </div>
                <div id="chord-chart" class="chord-chart"></div>
            </div>

            <div id="welcome-screen">
                <div class="welcome-content">
                    <h2>Welcome to Capo</h2>
                    <p>Find songs instantly, transpose on the fly, and play without interruption.</p>
                    <button id="start-search" class="primary-btn">Find a Song</button>

                    <div class="feature-cards">
                        <div class="feature-card">
                            <svg class="icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 19V5M5 12l7-7 7 7M5 12l7 7 7-7"/>
                            </svg>
                            <h3>Transpose</h3>
                            <p>Change the key instantly with one tap</p>
                        </div>
                        <div class="feature-card">
                            <svg class="icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 5v14M19 12l-7 7-7-7"/>
                            </svg>
                            <h3>Auto-scroll</h3>
                            <p>Hands-free scrolling at your tempo</p>
                        </div>
                        <div class="feature-card">
                            <svg class="icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                            </svg>
                            <h3>Save Offline</h3>
                            <p>Access your songs without internet</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div id="chord-modal" class="modal hidden">
            <div class="modal-content">
                <button id="close-chord-modal" class="close-btn">×</button>
                <div id="chord-diagram-container">
                    <h3 id="chord-name"></h3>
                    <div id="chord-diagram"></div>
                    <div id="chord-alternatives"></div>
                </div>
            </div>
        </div>

        <div id="auto-scroll-controls" class="scroll-controls hidden">
            <button id="scroll-slower" class="scroll-btn">−</button>
            <span id="scroll-speed">1x</span>
            <button id="scroll-faster" class="scroll-btn">+</button>
            <button id="scroll-pause" class="scroll-btn">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                </svg>
            </button>
        </div>

        <!-- Floating controls for song view -->
        <div id="floating-controls" class="floating-controls hidden">
            <div class="floating-controls-group">
                <button id="floating-transpose-down" class="floating-btn" title="Transpose down">♭</button>
                <button id="floating-transpose-up" class="floating-btn" title="Transpose up">♯</button>
            </div>
            <div class="floating-controls-group">
                <button id="floating-auto-scroll" class="floating-btn" title="Auto-scroll">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
                <button id="floating-save" class="floating-btn" title="Save song">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
                    </svg>
                </button>
            </div>
            <div class="floating-controls-group">
                <button id="scroll-to-top" class="floating-btn" title="Scroll to top">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="js/chords.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/transpose.js"></script>
    <script src="js/scroll.js"></script>
    <script src="js/scraper-client.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
